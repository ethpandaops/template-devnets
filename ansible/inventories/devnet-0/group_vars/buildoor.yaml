# Win precedence over prysm.yaml / geth.yaml so the overrides below stick
ansible_group_priority: 100

buildoor_container_image: "{{ default_tooling_images.buildoor }}"
buildoor_container_pull: true
buildoor_container_networks: "{{ docker_networks_shared }}"

buildoor_jwt_path: /data/execution-auth.secret
buildoor_cl_client: "http://beacon:{{ ethereum_node_cl_ports_http_beacon }}"
buildoor_el_engine_api: "http://execution:{{ ethereum_node_el_ports_engine }}"
buildoor_el_rpc: "http://execution:{{ ethereum_node_el_ports_http_rpc }}"

# Avoid conflict with prysm metrics on 127.0.0.1:8080
buildoor_api_port: 8085

# Wallet ECDSA private key
buildoor_wallet_privkey: "{{ secret_buildoor_wallet_privkey }}"
# Builder BLS private key
buildoor_builder_privkey: "{{ secret_buildoor_builder_privkey }}"

buildoor_container_env:
  VIRTUAL_HOST: "buildoor-{{ server_fqdn }}"
  VIRTUAL_PORT: "{{ buildoor_api_port | string }}"
  LETSENCRYPT_HOST: "buildoor-{{ server_fqdn }}"

# Buildoor host-only overrides
ethereum_node_cl: prysm
ethereum_node_el: geth
ethereum_node_cl_validator_enabled: false
ethereum_node_mev_boost_enabled: false

# Buildoor currently requires a custom prysm build with ePBS support.
prysm_container_image: ethpandaops/prysm-beacon-chain:bharath-123-buildoor-apis

# Re-apply the prysm.yaml merge so we don't lose the bootnode args while adding --prepare-all-payloads
prysm_container_command_extra_args: >-
  {{ prysm_container_command_extra_simple_args
     + prysm_container_command_extra_bootnode_args
     + ['--prepare-all-payloads'] }}

ethereum_node_docker_watchtower_containers_list:
  - execution
  - beacon
  - validator
  - xatu-sentry
  - buildoor
