# role: ethpandaops.general.ethereum_genesis
ethereum_genesis_generator_container_image: "{{ default_tooling_images.ethereum_genesis_generator }}"
ethereum_genesis_generator_version: "{{ ethereum_genesis_generator_container_image.split(':')[-1] }}"
ethereum_genesis_network_seed: "template-devnet-0"
ethereum_genesis_chain_id: "70{{ 99999999 | random(start=10000000, seed=ethereum_genesis_network_seed) }}"
ethereum_genesis_fork_version_suffix: "{{ 999999 | random(start=100000, seed=ethereum_genesis_network_seed) }}"
ethereum_genesis_generator_output_dir: "../network-configs/{{ network_iteration }}"
ethereum_genesis_timestamp: "{{ lookup('ansible.builtin.pipe', '{{ ethereum_genesis_timestamp_relative_cmd[ansible_system] }}') }}"
ethereum_genesis_timedelay: 60
ethereum_genesis_timestamp_relative_cmd:
  Linux: "date +%s -d '+45 minutes'"
  Darwin: "date -v +45M +%s"
shadowfork_height: 0
ethereum_genesis_mnemonic: "{{ secret_genesis_mnemonic }}"
ethereum_genesis_generator_config_files:
  cl/config.yaml: "{{ lookup('ansible.builtin.url', 'https://raw.githubusercontent.com/ethpandaops/ethereum-genesis-generator/v{{ethereum_genesis_generator_version}}/config-example/cl/config.yaml', split_lines=false) }}" # noqa yaml[line-length]
  cl/mnemonics.yaml: "{{ lookup('ansible.builtin.url', 'https://raw.githubusercontent.com/ethpandaops/ethereum-genesis-generator/v{{ethereum_genesis_generator_version}}/config-example/cl/mnemonics.yaml', split_lines=false) }}" # noqa yaml[line-length]
  el/genesis-config.yaml: "{{ lookup('ansible.builtin.url', 'https://raw.githubusercontent.com/ethpandaops/ethereum-genesis-generator/v{{ethereum_genesis_generator_version}}/config-example/el/genesis-config.yaml', split_lines=false) }}" # noqa yaml[line-length]
  values.env: |-
    export CHAIN_ID="{{ ethereum_genesis_chain_id }}"
    export EL_AND_CL_MNEMONIC="{{ ethereum_genesis_mnemonic }}"
    export NUMBER_OF_VALIDATORS=400
    export GENESIS_FORK_VERSION="0x10{{ ethereum_genesis_fork_version_suffix }}"
    export ALTAIR_FORK_VERSION="0x20{{ ethereum_genesis_fork_version_suffix }}"
    export BELLATRIX_FORK_VERSION="0x30{{ ethereum_genesis_fork_version_suffix }}"
    export CAPELLA_FORK_VERSION="0x40{{ ethereum_genesis_fork_version_suffix }}"
    export DENEB_FORK_VERSION="0x50{{ ethereum_genesis_fork_version_suffix }}"
    export ELECTRA_FORK_VERSION="0x60{{ ethereum_genesis_fork_version_suffix }}"
    export FULU_FORK_VERSION="0x70{{ ethereum_genesis_fork_version_suffix }}"
    export GENESIS_TIMESTAMP={{ ethereum_genesis_timestamp }}
    export GENESIS_DELAY={{ ethereum_genesis_timedelay }}
    export WITHDRAWAL_TYPE=0x02
    export EL_PREMINE_ADDRS='{"0x9a97ee9d32a0d68406e32b34c92afb81ce2bc467": {"balance": "100000ETH"}, "0x107781Bc6FA8f66B843f4216fd6D5862D3aa4fcd": {"balance": "100000ETH"}, "0x118A1030baf8Fa56f9B8235C163d3112FA8c3b89": {"balance": "100000ETH"}}'

# 0x9a97ee9d32a0d68406e32b34c92afb81ce2bc467: 100000ETH - arbitrum
# 0x107781Bc6FA8f66B843f4216fd6D5862D3aa4fcd: 100000ETH - optimism
# 0x118A1030baf8Fa56f9B8235C163d3112FA8c3b89: 100000ETH - lido

ethereum_genesis_validator_keys_output_dir: "{{ ansible_inventory_sources[0] | dirname }}/files/validator_keys"
ethereum_genesis_validator_bls_change_execution_address: "{{ ethereum_node_cl_validator_fee_recipient }}"
ethereum_genesis_validator_keyranges: >-
  {%- set ns = namespace() -%}
  {%- set ns.ethereum_genesis_validator_keyranges = {} -%}
  {%- for host in groups['all'] -%}
  {%-   if hostvars[host].validator_start is defined and hostvars[host].validator_end is defined -%}
  {%-      set v = {'start':hostvars[host].validator_start, 'end': hostvars[host].validator_end } -%}
  {%-     set _ = ns.ethereum_genesis_validator_keyranges.update({host: v}) -%}
  {%-   endif -%}
  {%- endfor -%}
  {{ ns.ethereum_genesis_validator_keyranges }}

# role: ethpandaops.general.bootstrap
bootstrap_default_user_authorized_keys_plain:
  - "ssh-rsa  # devops-eth2-shared"
  - "ssh-rsa  # github-actions-ci"
bootstrap_default_user_authorized_keys_github_all:
  - barnabasbusa
  - parithosh
  - samcm
  - savid
  - skylenet
  - pk910
  - mattevans
  - qu0b

bootstrap_default_user_authorized_keys_github: >
  {{
    (bootstrap_default_user_authorized_keys_github_all | default([])) +
    (bootstrap_default_user_authorized_keys_github_team_el | default([])) +
    (bootstrap_default_user_authorized_keys_github_team_cl | default([]))
  }}

node_exporter_container_image: "{{ default_tooling_images.node_exporter }}"
prometheus_container_image: "{{ default_tooling_images.prometheus }}"
vector_container_image: "{{ default_tooling_images.vector }}"
json_rpc_snooper_container_image: "{{ default_tooling_images.json_rpc_snooper }}"

# role: ethpandaops.general.ethereum_node
ethereum_node_images_always_pull: true
ethereum_node_metrics_exporter_enabled: true
ethereum_node_xatu_sentry_enabled: true
ethereum_node_cl_validator_enabled: "{{ validator_start is defined and validator_end is defined }}"
ethereum_node_cl_validator_fee_recipient: "0xf97e180c050e5Ab072211Ad2C213Eb5AEE4DF134"
ethereum_node_cl_ports_p2p_tcp: 9000
ethereum_node_cl_ports_p2p_udp: 9000
ethereum_node_cl_ports_http_beacon: 5052
ethereum_node_cl_ports_metrics: 5054
ethereum_node_el_ports_p2p_tcp: 30303
ethereum_node_el_ports_p2p_udp: 30303
ethereum_node_el_ports_http_rpc: 8545
ethereum_node_el_ports_ws_rpc: 8546
ethereum_node_el_ports_engine: 8551
ethereum_node_el_ports_metrics: 6060
ethereum_node_ipv6_enabled: true
ethereum_node_el_public_ipv6: "{{ host_ipv6_prefix | ansible.utils.ipaddr(service_ipv6_offsets.execution) | ansible.utils.ipaddr('address') if (docker_network_enable_ipv6 | bool) else '' }}"
ethereum_node_cl_public_ipv6: "{{ host_ipv6_prefix | ansible.utils.ipaddr(service_ipv6_offsets.beacon) | ansible.utils.ipaddr('address') if (docker_network_enable_ipv6 | bool) else '' }}"
ethereum_node_validator_public_ipv6: "{{ host_ipv6_prefix | ansible.utils.ipaddr(service_ipv6_offsets.validator) | ansible.utils.ipaddr('address') if (docker_network_enable_ipv6 | bool) else '' }}"
ethereum_node_snooper_rpc_public_ipv6: "{{ host_ipv6_prefix | ansible.utils.ipaddr(service_ipv6_offsets.snooper_rpc) | ansible.utils.ipaddr('address') if (docker_network_enable_ipv6 | bool) else '' }}"
ethereum_node_snooper_engine_public_ipv6: "{{ host_ipv6_prefix | ansible.utils.ipaddr(service_ipv6_offsets.snooper_engine) | ansible.utils.ipaddr('address') if (docker_network_enable_ipv6 | bool) else '' }}"
ethereum_node_skip_cleanup: true
ethereum_node_docker_watchtower_enabled: true
ethereum_node_docker_watchtower_containers_list:
  - execution
  - beacon
  - validator
  - xatu-sentry
  - external-block-builder
docker_watchtower_container_additional_args:
  - --interval=900
  - --stop-timeout=300s
  - --include-restarting
ethereum_node_json_rpc_snooper_engine_enabled: true
ethereum_node_json_rpc_snooper_engine_name: "snooper-engine"
ethereum_node_json_rpc_snooper_engine_port: 8561
ethereum_node_json_rpc_snooper_engine_public_port: 8961
ethereum_node_json_rpc_snooper_engine_container_env:
  SNOOPER_API_PORT: "{{ ethereum_node_json_rpc_snooper_engine_public_port | quote }}"
  SNOOPER_API_AUTH: "{{ secret_nginx_shared_basic_auth.name }}:{{ secret_nginx_shared_basic_auth.password }}"

# role: ethpandaops.general.generate_kubernetes_config
gen_kubernetes_config_dora_execution_snooper_port: 8961
gen_kubernetes_config_dora_frontend_rainbowkit_id: "15fe4ab4d5c0bcb6f0dc7c398301ff0e"
gen_kubernetes_config_dora_execution_endpoints_url: "https://raw.githubusercontent.com/ethpandaops/template-devnets/refs/heads/master/kubernetes/{{ network_iteration }}/dora/endpoints-el.yaml"
gen_kubernetes_config_dora_consensus_endpoints_url: "https://raw.githubusercontent.com/ethpandaops/template-devnets/refs/heads/master/kubernetes/{{ network_iteration }}/dora/endpoints-cl.yaml"
gen_kubernetes_config_dora_api_secret: "{{ secret_dora_api_key }}"

# role: ethpandaops.general.xatu_sentry
xatu_sentry_container_image: "{{ default_tooling_images.xatu_sentry }}"
xatu_sentry_config_name: "{{ ethereum_network_name }}-{{ inventory_hostname }}"
xatu_sentry_config_server_address: "{{ secret_xatu_sentry.server_address }}"
xatu_sentry_config_server_auth_user: "{{ secret_xatu_sentry.user }}"
xatu_sentry_config_server_auth_password: "{{ secret_xatu_sentry.password }}"
xatu_sentry_config_network_name_override: "{{ ethereum_network_name }}"

# role: ethpandaops.general.ethereum_metrics_exporter
ethereum_metrics_exporter_container_image: "{{ default_tooling_images.ethereum_metrics_exporter }}"
ethereum_metrics_exporter_container_user: root
ethereum_metrics_exporter_container_volumes:
  - "{{ ethereum_metrics_exporter_dir_config }}:/config:ro"
  - /var/run/docker.sock:/var/run/docker.sock:ro
  - /data:/data:ro
ethereum_metrics_exporter_config: |
  consensus:
    enabled: true
    url: "{{ ethereum_metrics_exporter_cl_endpoint }}"
    name: "consensus-client"
  execution:
    enabled: true
    url: "{{ ethereum_metrics_exporter_el_endpoint }}"
    name: "execution-client"
    modules:
      - "eth"
      - "net"
      - "web3"
      - "txpool"
  docker:
    enabled: true
    endpoint: "unix:///var/run/docker.sock"
    interval: "10s"
    containers:
      - name: "execution"
        type: "execution"
        filesystem:
          enabled: true
        volumes:
          - name: "*"
            monitor: true
          - path: "/execution-auth.jwt"
            monitor: false
          - path: "/network-config"
            monitor: false
      - name: "beacon"
        type: "consensus"
        filesystem:
          enabled: true
        volumes:
          - name: "*"
            monitor: true
          - path: "/execution-auth.jwt"
            monitor: false
          - path: "/network-config"
            monitor: false

# role: eth_testnet_config
eth_testnet_config_dir: /data/ethereum-network-config/metadata
eth_testnet_config_local_dir_enabled: true
eth_testnet_config_local_dir_src: "{{ ethereum_genesis_generator_output_dir }}/metadata/"

# role: gen_basic_auth_nginx
gen_basic_auth_nginx_name: "{{ secret_nginx_shared_basic_auth.name }}"
gen_basic_auth_nginx_password: "{{ secret_nginx_shared_basic_auth.password }}"
docker_nginx_proxy_container_image: "{{ default_tooling_images.nginx_proxy }}"
docker_nginx_proxy_docker_gen_container_image: "{{ default_tooling_images.nginx_proxy_gen }}"
docker_nginx_proxy_acme_companion_container_image: "{{ default_tooling_images.nginx_proxy_acme }}"

# role: ethpandaops.general.docker_nginx_proxy
docker_nginx_proxy_public_ipv6: "{{ host_ipv6_prefix | ansible.utils.ipaddr(service_ipv6_offsets.nginx_proxy) | ansible.utils.ipaddr('address') if (docker_network_enable_ipv6 | bool) else '' }}"
docker_nginx_proxy_container_name: nginx-proxy
docker_nginx_proxy_default_email: "certs@{{ domain }}"
docker_nginx_proxy_docker_gen_container_name: nginx-proxy-gen
docker_nginx_proxy_docker_gen_container_env:
  RESOLVERS: "1.1.1.1"
  ENABLE_IPV6: "true"
docker_nginx_proxy_acme_companion_enabled: false
docker_nginx_proxy_acme_companion_container_name: nginx-proxy-acme
docker_nginx_proxy_acme_companion_container_env:
  DEFAULT_EMAIL: "{{ docker_nginx_proxy_default_email }}"
  NGINX_PROXY_CONTAINER: "{{ docker_nginx_proxy_container_name }}"
  NGINX_DOCKER_GEN_CONTAINER: "{{ docker_nginx_proxy_docker_gen_container_name }}"
  ACME_CA_URI: https://acme.zerossl.com/v2/DV90
  ACME_EAB_KID: "{{ secret_zerossl.ACME_EAB_KID }}"
  ACME_EAB_HMAC_KEY: "{{ secret_zerossl.ACME_EAB_HMAC_KEY }}"
docker_nginx_proxy_container_networks: >-
  {{ [{'name': 'shared'} | combine({'ipv6_address': docker_nginx_proxy_public_ipv6} if (docker_nginx_proxy_public_ipv6 | default('') | length > 0) else {})] }}
docker_nginx_proxy_docker_gen_container_networks: []
docker_nginx_proxy_acme_companion_container_networks: "{{ docker_networks_shared }}"
docker_nginx_proxy_acme_monitor_container_networks: "{{ docker_networks_shared }}"
docker_nginx_proxy_acme_monitor_enabled: false
docker_nginx_proxy_datadir: /opt/nginx-proxy
docker_nginx_proxy_container_volumes:
  - "{{ docker_nginx_proxy_datadir }}/conf:/etc/nginx/conf.d"
  - "{{ docker_nginx_proxy_datadir }}/vhost:/etc/nginx/vhost.d"
  - "{{ docker_nginx_proxy_datadir }}/certs:/etc/nginx/certs:ro"
  - html:/usr/share/nginx/html
  - "{{ docker_nginx_proxy_datadir }}/htpasswd:/etc/nginx/htpasswd:ro"
docker_nginx_proxy_cert_loader_container_image: "{{ default_tooling_images.nginx_proxy_cert_loader }}"
docker_nginx_proxy_cert_linker_container_image: "{{ default_tooling_images.nginx_proxy_cert_linker }}"
docker_nginx_proxy_cert_loader_container_networks: []
docker_nginx_proxy_cert_linker_container_networks: []
docker_nginx_proxy_wildcard_cert: "{{ network_server_subdomain }}"
docker_nginx_proxy_wildcard_cert_url: "http://cert.{{ network_server_subdomain }}/{{ network_server_subdomain }}-latest.tar.enc"
docker_nginx_proxy_wildcard_cert_psk: "{{ secret_cert_encryption_psk }}"

# OTLP egress to the prod analytics gateway (Vector ships container logs here).
# Ingress identity (auth username + ingress_user tag) is the current devnet name
# rather than secret_loki.username: the sops username drifts stale between devnet
# iterations, while the gateway only validates the (constant) password ‚ÄĒ so using
# the network name keeps log attribution correct no matter what sops holds.
otlp_endpoint: "https://otlp.analytics.production.platform.ethpandaops.io"
otlp_deployment_env: production

# role: ethpandaops.general.vector
vector_config: |
  # Docker container logs (clean per-container metadata straight from the Docker API)
  [sources.in]
    type = "docker_logs"
    exclude_containers = [
      "{{ vector_container_name }}",
      "ethereum-metrics-exporter",
      "nginx-proxy",
      "node_exporter",
      "prometheus",
      "snooper-",
    ]

  # Shape docker_logs events into an OTLP resourceLogs envelope with full metadata.
  [transforms.otel_shape]
    type = "remap"
    inputs = ["in"]
    source = '''
      ts_ns = to_string(to_unix_timestamp(now(), unit: "nanoseconds"))
      if is_timestamp(.timestamp) {
        ts_ns = to_string(to_unix_timestamp!(.timestamp, unit: "nanoseconds"))
      }
      msg  = string(.message)        ?? ""
      ctr  = string(.container_name) ?? "unknown"
      img  = string(.image)          ?? ""
      strm = string(.stream)         ?? "stdout"

      # Extract the source log level: JSON-structured lines (.level / .severity)
      # first, then logfmt (level=xxx), then a level token near the start of a
      # plain-text line. Client formats vary (lighthouse truncates to 4 chars:
      # DEBG/ERRO/CRIT), so the text matcher allows a union of forms. SeverityText
      # keeps the source's exact text; only SeverityNumber is normalised to the
      # OTel scale (https://opentelemetry.io/docs/specs/otel/logs/data-model/#field-severitynumber).
      # Unrecognised lines are left unset rather than guessed.
      sevtext = ""
      if starts_with(msg, "{") {
        j = parse_json(msg) ?? {}
        if is_string(j.level) {
          sevtext = string!(j.level)
        } else if is_string(j.severity) {
          sevtext = string!(j.severity)
        }
      }
      if sevtext == "" {
        lm = parse_regex(msg, r'(?i)\b(?:level|lvl|severity)="?(?P<l>[a-z]+)') ?? {}
        if is_string(lm.l) {
          sevtext = string!(lm.l)
        } else {
          hm = parse_regex(truncate(msg, 48), r'(?i)\b(?P<l>TRACE|DEBUG|DEBG|DBUG|NOTICE|INFO|WARNING|WARN|ERROR|ERRO|CRITICAL|CRIT|FATAL|PANIC)\b') ?? {}
          if is_string(hm.l) {
            sevtext = string!(hm.l)
          }
        }
      }
      lvl = upcase(sevtext)
      sevnum = 0
      if lvl == "TRACE" {
        sevnum = 1
      } else if lvl == "DEBUG" || lvl == "DEBG" || lvl == "DBUG" {
        sevnum = 5
      } else if lvl == "INFO" || lvl == "INFOR" || lvl == "NOTICE" {
        sevnum = 9
      } else if lvl == "WARN" || lvl == "WARNING" {
        sevnum = 13
      } else if lvl == "ERROR" || lvl == "ERRO" {
        sevnum = 17
      } else if lvl == "CRIT" || lvl == "CRITICAL" {
        sevnum = 18
      } else if lvl == "FATAL" || lvl == "PANIC" {
        sevnum = 21
      }

      attrs = [
        {"key": "service.name",           "value": {"stringValue": ctr}},
        {"key": "container.name",         "value": {"stringValue": ctr}},
        {"key": "container.image.name",   "value": {"stringValue": img}},
        {"key": "deployment.environment", "value": {"stringValue": "{{ otlp_deployment_env }}"}},
        {"key": "forwarder",              "value": {"stringValue": "vector"}},
        {"key": "ingress_user",           "value": {"stringValue": "{{ ethereum_network_name }}"}},
        {"key": "network",                "value": {"stringValue": "{{ ethereum_network_name }}"}},
        {"key": "testnet",                "value": {"stringValue": "{{ ethereum_network_name }}"}},
        {"key": "instance",               "value": {"stringValue": "{{ inventory_hostname }}"}},
        {"key": "host.name",              "value": {"stringValue": "{{ inventory_hostname }}"}}
      ]
  {%- if ethereum_node_cl is defined +%}
      attrs = push(attrs, {"key": "ethereum_cl", "value": {"stringValue": "{{ ethereum_node_cl }}"}})
  {%- endif +%}
  {%- if ethereum_node_el is defined +%}
      attrs = push(attrs, {"key": "ethereum_el", "value": {"stringValue": "{{ ethereum_node_el }}"}})
  {%- endif +%}
      . = {
        "resource_log": {
          "resource": {"attributes": attrs},
          "scopeLogs": [{
            "scope": {"name": "{{ ethereum_network_name }}-vector"},
            "logRecords": [{
              "timeUnixNano":   ts_ns,
              "severityNumber": sevnum,
              "severityText":   sevtext,
              "body": {"stringValue": msg},
              "attributes": [{"key": "stream", "value": {"stringValue": strm}}]
            }]
          }]
        }
      }
    '''

  # Batch many shaped log events into one OTLP envelope (reduce works on logs).
  [transforms.batch_envelope]
    type = "reduce"
    inputs = ["otel_shape"]
    expire_after_ms = 30000
    end_every_period_ms = 5000
    max_events = 500
    merge_strategies.resource_log = "array"

  [transforms.finalize_envelope]
    type = "remap"
    inputs = ["batch_envelope"]
    source = '''
      . = {"resourceLogs": .resource_log}
    '''

  [sinks.otlp_logs]
    type = "opentelemetry"
    inputs = ["finalize_envelope"]
    [sinks.otlp_logs.protocol]
      type = "http"
      uri = "{{ otlp_endpoint }}/v1/logs"
      method = "post"
      encoding.codec = "otlp"
      auth.strategy = "basic"
      auth.user = "{{ ethereum_network_name }}"
      auth.password = "{{ secret_loki.password }}"
      # One event here is already a full OTLP envelope (built by the reduce above).
      # max_events MUST be 1 ‚ÄĒ OTLP/HTTP allows one envelope per request.
      batch.max_events = 1
      batch.timeout_secs = 5
